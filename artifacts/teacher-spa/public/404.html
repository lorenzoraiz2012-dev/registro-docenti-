<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Registro Docente</title>
  <script>
    var l = window.location;
    var base = '/registro-docenti-';
    var path = l.pathname.replace(base, '') || '/';
    var q = l.search.slice(1);
    var hash = l.hash.slice(1);
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + base +
      '/?p=' + encodeURIComponent(path) +
      (q ? '&q=' + encodeURIComponent(q) : '') +
      (hash ? '&h=' + encodeURIComponent(hash) : '')
    );
  </script>
</head>
<body></body>
</html>
